<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid dots pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Logo icon — terminal window style -->
  <rect x="80" y="195" width="72" height="72" rx="14" fill="#111827"/>
  <rect x="80" y="195" width="72" height="72" rx="14" fill="none" stroke="#374151" stroke-width="1.5"/>
  <circle cx="96" cy="211" r="4.5" fill="#ff5f57"/>
  <circle cx="112" cy="211" r="4.5" fill="#febc2e"/>
  <circle cx="128" cy="211" r="4.5" fill="#28c840"/>
  <text x="90" y="252" font-family="monospace" font-size="22" font-weight="700" fill="#4ade80">&gt;_</text>

  <!-- Brand name -->
  <text x="166" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">DevTools</text>
  <text x="166" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#4ade80">Online</text>

  <!-- Title -->
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">Free Developer Tools</text>

  <!-- Subtitle -->
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Everything runs in your browser. No sign-up. No tracking.</text>

  <!-- Description -->
  <text x="80" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748b">120+ tools · Offline ready · Open source</text>

  <!-- Tool pills -->
  <rect x="80" y="492" width="140" height="36" rx="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="515" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" fill="#93c5fd">JSON</text>

  <rect x="232" y="492" width="160" height="36" rx="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="312" y="515" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" fill="#93c5fd">Base64</text>

  <rect x="404" y="492" width="130" height="36" rx="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="469" y="515" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" fill="#93c5fd">Regex</text>

  <rect x="546" y="492" width="130" height="36" rx="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="611" y="515" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" fill="#93c5fd">Hashing</text>

  <rect x="688" y="492" width="110" height="36" rx="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="743" y="515" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" fill="#93c5fd">JWT</text>

  <rect x="810" y="492" width="110" height="36" rx="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="865" y="515" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" fill="#93c5fd">UUID</text>

  <rect x="932" y="492" width="140" height="36" rx="18" fill="#1e3a5f" stroke="#8b5cf6" stroke-width="1"/>
  <text x="1002" y="515" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" fill="#c4b5fd">+100 more</text>

  <!-- Right side decorative code block -->
  <rect x="760" y="175" width="370" height="275" rx="14" fill="#0f1729" opacity="0.9" stroke="#1e293b" stroke-width="1"/>
  <rect x="760" y="175" width="370" height="36" rx="14" fill="#1e293b"/>
  <rect x="760" y="196" width="370" height="15" fill="#1e293b"/>
  <circle cx="790" cy="193" r="6" fill="#ff5f57"/>
  <circle cx="812" cy="193" r="6" fill="#febc2e"/>
  <circle cx="834" cy="193" r="6" fill="#28c840"/>
  <text x="790" y="237" font-family="monospace" font-size="13" fill="#64748b">// JSON Formatter</text>
  <text x="790" y="260" font-family="monospace" font-size="13" fill="#7dd3fc">const <tspan fill="#e2e8f0">data</tspan> = <tspan fill="#a78bfa">JSON</tspan><tspan fill="#e2e8f0">.parse(input)</tspan></text>
  <text x="790" y="283" font-family="monospace" font-size="13" fill="#e2e8f0">return <tspan fill="#a78bfa">JSON</tspan></text>
  <text x="790" y="306" font-family="monospace" font-size="13" fill="#e2e8f0">  .stringify(data, </text>
  <text x="790" y="329" font-family="monospace" font-size="13" fill="#fbbf24">    null, 2</text>
  <text x="790" y="352" font-family="monospace" font-size="13" fill="#e2e8f0">  )</text>
  <text x="790" y="420" font-family="monospace" font-size="13" fill="#22c55e">✓ Valid JSON · 12 keys</text>

</svg>
